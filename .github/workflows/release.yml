on:
  push:
    tags:
      - 'v*'

name: Create Release

jobs:
  build:
    name: Build and Release
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux builds
          - os: ubuntu-latest
            goos: linux
            goarch: amd64

          - os: ubuntu-latest
            goos: linux
            goarch: arm64

          - os: ubuntu-latest
            goos: linux
            goarch: arm
            goarm: 7

          # macOS (cross-compiled from Linux)
          - os: ubuntu-latest
            goos: darwin
            goarch: amd64

          - os: ubuntu-latest
            goos: darwin
            goarch: arm64

          # Windows (native runner)
          - os: windows-latest
            goos: windows
            goarch: amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        run: go test -v ./...

      - name: Build binary
        shell: bash
        run: |
          mkdir -p dist

          export GOOS=${{ matrix.goos }}
          export GOARCH=${{ matrix.goarch }}
          export CGO_ENABLED=0

          VERSION=${GITHUB_REF_NAME}

          # Handle ARM variant naming
          if [ ! -z "${{ matrix.goarm }}" ]; then
            export GOARM=${{ matrix.goarm }}
            ARCH_NAME="arm${GOARM}"
          else
            ARCH_NAME="${GOARCH}"
          fi

          EXT=""
          if [ "$GOOS" = "windows" ]; then
            EXT=".exe"
          fi

          OUTPUT="kubazulo-${GOOS}-${ARCH_NAME}-${VERSION}${EXT}"

          echo "Building $OUTPUT"
          go build -v -o "dist/$OUTPUT"

      - name: Package artifacts
        shell: bash
        run: |
          cd dist

          for file in *; do
            if [[ "$file" == *.exe ]]; then
              # Create zip but KEEP the exe
              zip "$file.zip" "$file"
            else
              tar -czf "$file.tar.gz" "$file"
              rm "$file"
            fi
          done

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}